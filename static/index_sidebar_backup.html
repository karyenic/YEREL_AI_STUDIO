<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yerel AI Studio V3</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; font-size:1.05rem; }
        body { background:#0f0f13; color:#e0e0e0; display:flex; height:100vh; overflow:hidden; }
        #sidebar { width:320px; background:#14141c; border-right:1px solid #2a2a32; display:flex; flex-direction:column; padding:16px; overflow-y:auto; }
        #sidebar h2 { font-size:1.4rem; margin-bottom:12px; }
        #chatTypeSelect { width:100%; padding:8px; margin-bottom:8px; background:#2a2a32; color:white; border:1px solid #3a3a44; border-radius:40px; font-size:1rem; }
        #newChatBtn { padding:10px; background:#2b6e9e; border:none; border-radius:40px; color:white; font-weight:bold; cursor:pointer; margin-bottom:16px; font-size:1.1rem; }
        #historyList { flex:1; overflow-y:auto; }
        .hist-item { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; margin:4px 0; background:#1e1e26; border-radius:12px; cursor:pointer; }
        .hist-item.active { background:#2b6e9e; }
        .hist-item .model-tag { font-size:0.8rem; background:#2a2a32; padding:2px 10px; border-radius:12px; color:#aaa; margin-left:6px; flex-shrink:0; }
        .hist-item .del { background:none; border:none; color:#ff8888; cursor:pointer; font-size:1rem; padding:0 4px; }
        .hist-item .last-msg { font-size:0.8rem; color:#999; margin-top:2px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; max-width:180px; }
        .hist-item .model-name { font-weight:bold; }
        #main { flex:1; display:flex; flex-direction:column; }
        #topbar { padding:12px 20px; background:#14141c; border-bottom:1px solid #2a2a32; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
        #topbar .chat-info { display:flex; align-items:center; gap:10px; font-size:1.2rem; }
        #topbar .right-tools { display:flex; align-items:center; gap:8px; }
        #modelSelect { background:#2a2a32; border:1px solid #3a3a44; color:white; padding:8px 14px; border-radius:40px; font-size:1rem; min-width:180px; }
        #themeToggle { background:#5a4a2e; border:none; color:white; padding:8px 14px; border-radius:40px; cursor:pointer; font-size:1rem; }
        #chatBox { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px; }
        .msg { max-width:80%; padding:12px 18px; border-radius:24px; word-wrap:break-word; font-size:1.1rem; }
        .user { align-self:flex-end; background:#1e4a6b; color:white; }
        .assistant { align-self:flex-start; background:#2d2d35; }
        .system { align-self:center; background:#4a2e2e; color:#ffb4a2; font-size:0.9rem; max-width:90%; text-align:center; }
        #inputArea { padding:16px; background:#15151b; border-top:1px solid #2c2c34; display:flex; flex-direction:column; gap:12px; }
        .input-row { display:flex; gap:12px; align-items:flex-end; }
        #prompt { flex:1; background:#0c0c10; border:1px solid #3a3a44; border-radius:24px; padding:14px; color:white; resize:vertical; font-size:1.1rem; }
        button { background:#2b6e9e; border:none; border-radius:40px; color:white; padding:0 24px; height:48px; cursor:pointer; font-weight:bold; font-size:1.1rem; }
        .image-preview { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; background:#0c0c10; padding:8px; border-radius:16px; }
        .preview-item { position:relative; }
        .preview-item img { height:60px; border-radius:8px; }
        .remove-img { position:absolute; top:-8px; right:-8px; background:#8b5a2b; border-radius:50%; width:22px; height:22px; font-size:14px; padding:0; line-height:22px; text-align:center; cursor:pointer; }
        .tool-btn { background:#2e7d5e; }
        .drop-zone { border:2px dashed #3a3a44; border-radius:20px; padding:20px; text-align:center; color:#aaa; margin-top:8px; cursor:pointer; transition:0.2s; font-size:1rem; }
        .drop-zone.dragover { background:#2a2a32; border-color:#2b6e9e; }
        @media (max-width:700px) { #sidebar { width:220px; } .msg { max-width:95%; } }
    </style>
</head>
<body>
<div id="sidebar">
    <h2>💬 Sohbetler</h2>
    <select id="chatTypeSelect">
        <option value="local">Yerel Model</option>
        <option value="cloud">Bulut Model (Gemini 2.5)</option>
    </select>
    <button id="newChatBtn">+ Yeni Sohbet</button>
    <div id="historyList"></div>
</div>
<div id="main">
    <div id="topbar">
        <div class="chat-info">
            <span id="chatTitle">Sohbet</span>
        </div>
        <div class="right-tools">
            <select id="modelSelect"></select>
            <button id="themeToggle">🌓 Tema</button>
        </div>
    </div>
    <div id="chatBox">
        <div class="msg system">Sistem: Hoş geldiniz! Sol menüden bir sohbet seçin veya yeni sohbet başlatın.</div>
    </div>
    <div id="inputArea">
        <div class="input-row">
            <textarea id="prompt" rows="2" placeholder="Mesaj yaz... (Enter gönder, Shift+Enter satır atlar)"></textarea>
            <button id="sendBtn">Gönder</button>
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <input type="file" id="imageInput" accept="image/*" multiple style="display:none">
            <button id="selectImageBtn">📷 Görsel Seç</button>
            <button id="excelBtn" class="tool-btn">📊 Excel Yap</button>
            <button id="pdfBtn" class="tool-btn">📄 PDF Yükle</button>
        </div>
        <div id="imagePreviewContainer" class="image-preview" style="display:none;"></div>
        <div id="dropZone" class="drop-zone">📸 Görseli buraya sürükleyin veya yapıştırın</div>
        <input type="file" id="pdfInput" accept=".pdf" style="display:none">
    </div>
</div>
<script>
(function(){
    'use strict';
    let isLoading = false, currentImages = [], conversations = {}, currentConvId = null, nextId = 1, dark = true;
    const chatBox = document.getElementById('chatBox'), promptEl = document.getElementById('prompt'), sendBtn = document.getElementById('sendBtn');
    const modelSelect = document.getElementById('modelSelect'), historyList = document.getElementById('historyList'), newChatBtn = document.getElementById('newChatBtn');
    const themeToggle = document.getElementById('themeToggle');
    const imageInput = document.getElementById('imageInput'), selectImageBtn = document.getElementById('selectImageBtn');
    const excelBtn = document.getElementById('excelBtn'), pdfBtn = document.getElementById('pdfBtn'), pdfInput = document.getElementById('pdfInput');
    const previewContainer = document.getElementById('imagePreviewContainer'), chatTitle = document.getElementById('chatTitle');
    const dropZone = document.getElementById('dropZone');
    const chatTypeSelect = document.getElementById('chatTypeSelect');

    function generateTitle(messages) {
        const first = messages.find(m => m.role === 'user');
        if (first && first.content) {
            let t = first.content;
            if (t.length > 30) t = t.substring(0, 30) + '…';
            return t;
        }
        return 'Yeni Sohbet';
    }

    function save() {
        localStorage.setItem('convs', JSON.stringify(conversations));
        localStorage.setItem('currentId', currentConvId);
        localStorage.setItem('nextId', nextId);
    }

    function loadConversations() {
        const saved = localStorage.getItem('convs');
        if (saved) {
            conversations = JSON.parse(saved);
            currentConvId = localStorage.getItem('currentId');
            nextId = parseInt(localStorage.getItem('nextId')) || 1;
            if (!currentConvId || !conversations[currentConvId]) {
                const ids = Object.keys(conversations);
                currentConvId = ids.length ? ids[0] : null;
                if (!currentConvId) createNewChat();
            }
        } else {
            createNewChat();
        }
        renderHistory();
        renderChat();
    }

    function createNewChat() {
        const model = modelSelect.value || 'moondream:latest';
        const type = chatTypeSelect.value;
        // Aynı model varsa üzerine yazma, yeni sohbet oluştur
        const id = String(nextId++);
        conversations[id] = {
            title: model,
            model: model,
            type: type,
            messages: [{ role: 'system', content: 'Sistem: Yeni sohbet (' + model + ') başladı. Tip: ' + type }]
        };
        currentConvId = id;
        save();
        renderHistory();
        renderChat();
        modelSelect.value = model;
    }

    function deleteChat(id) {
        if (id === currentConvId) {
            const ids = Object.keys(conversations).filter(i => i !== id);
            currentConvId = ids.length ? ids[0] : null;
            if (!currentConvId) createNewChat();
        }
        delete conversations[id];
        save();
        renderHistory();
        if (currentConvId) renderChat();
    }

        function renderHistory() {
        historyList.innerHTML = '';
        // Modellere gÃ¶re grupla
        const modelMap = {};
        let ids = Object.keys(conversations);
        // Her model iÃ§in en son sohbeti bul
        for (let id of ids) {
            const conv = conversations[id];
            const model = conv.model || 'bilinmiyor';
            // EÄŸer model daha Ã¶nce eklenmemiÅŸse veya bu sohbet daha gÃ¼ncelse
            if (!modelMap[model]) {
                modelMap[model] = {
                    id: id,
                    model: model,
                    lastMsg: conv.messages[conv.messages.length-1]?.content || '',
                    lastConv: conv
                };
            } else {
                // Daha gÃ¼ncel bir sohbet var mÄ± kontrol et (son mesaj tarihine gÃ¶re deÄŸil, id sÄ±rasÄ±na gÃ¶re)
                // BasitÃ§e, son eklenen id'yi al
                if (parseInt(id) > parseInt(modelMap[model].id)) {
                    modelMap[model].id = id;
                    modelMap[model].lastMsg = conv.messages[conv.messages.length-1]?.content || '';
                    modelMap[model].lastConv = conv;
                }
            }
        }
        // Modelleri sÄ±rala (alfabetik)
        const sortedModels = Object.keys(modelMap).sort();
        for (let model of sortedModels) {
            const item = modelMap[model];
            const id = item.id;
            const conv = conversations[id];
            const lastMsg = conv.messages[conv.messages.length-1]?.content || 'Yeni sohbet';
            const snippet = lastMsg.length > 30 ? lastMsg.substring(0,30) + 'â€¦' : lastMsg;
            const div = document.createElement('div');
            div.className = 'hist-item' + (id === currentConvId ? ' active' : '');
            const infoDiv = document.createElement('div');
            infoDiv.style.display = 'flex';
            infoDiv.style.flexDirection = 'column';
            infoDiv.style.flex = '1';
            const nameSpan = document.createElement('span');
            nameSpan.className = 'model-name';
            nameSpan.textContent = model;
            const msgSpan = document.createElement('span');
            msgSpan.className = 'last-msg';
            msgSpan.textContent = snippet;
            infoDiv.appendChild(nameSpan);
            infoDiv.appendChild(msgSpan);
            const delBtn = document.createElement('button');
            delBtn.className = 'del';
            delBtn.textContent = 'ðŸ—‘ï¸';
            delBtn.onclick = (e) => {
                e.stopPropagation();
                if (confirm('Bu sohbet silinsin mi?')) deleteChat(id);
            };
            div.appendChild(infoDiv);
            div.appendChild(delBtn);
            div.onclick = () => {
                if (isLoading) return;
                currentConvId = id;
                save();
                renderHistory();
                renderChat();
                modelSelect.value = model;
            };
            historyList.appendChild(div);
        }
    };
            div.appendChild(infoDiv);
            div.appendChild(delBtn);
            div.onclick = () => {
                if (isLoading) return;
                currentConvId = id;
                save();
                renderHistory();
                renderChat();
                modelSelect.value = conv.model || 'moondream:latest';
            };
            historyList.appendChild(div);
        }
    }

    function renderChat() {
        if (!currentConvId || !conversations[currentConvId]) {
            chatBox.innerHTML = '<div class="msg system">Sistem: Lütfen bir sohbet seçin.</div>';
            chatTitle.textContent = 'Sohbet';
            return;
        }
        const conv = conversations[currentConvId];
        const messages = conv.messages || [];
        chatBox.innerHTML = '';
        messages.forEach(msg => {
            const div = document.createElement('div');
            div.className = 'msg ' + msg.role;
            div.textContent = msg.content;
            chatBox.appendChild(div);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
        chatTitle.textContent = conv.model || 'Sohbet';
        if (conv.type) chatTypeSelect.value = conv.type;
        // dropdown gÃ¼ncelleme yapma, modelSelect.value zaten ayarlanÄ±yor
    }

    function addMessage(role, content) {
        if (!currentConvId) createNewChat();
        const conv = conversations[currentConvId];
        conv.messages.push({ role, content });
        if (role === 'user' && conv.messages.filter(m => m.role === 'user').length === 1) {
            const newTitle = generateTitle(conv.messages);
            if (newTitle !== 'Yeni Sohbet') conv.title = newTitle;
        }
        save();
        renderChat();
        renderHistory();
    }

    async function loadModels() {
        try {
            const res = await fetch('/models');
            const data = await res.json();
            const models = data.length ? data : ['moondream:latest'];
            modelSelect.innerHTML = '';
            models.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                let label = m;
                if (m.includes('moondream')) label = '🖼️ ' + m + ' (Görsel)';
                opt.textContent = label;
                modelSelect.appendChild(opt);
            });
            const conv = conversations[currentConvId];
            if (conv && conv.model) {
                modelSelect.value = conv.model;
            } else {
                modelSelect.value = models[0] || 'moondream:latest';
            }
        } catch (e) {
            console.error('Model listesi alınamadı:', e);
            modelSelect.innerHTML = '<option>moondream:latest</option>';
            modelSelect.value = 'moondream:latest';
        }
    }

    // Dropdown değişince o modele ait sohbeti aç
    modelSelect.onchange = function() {
        const model = this.value;
        if (!model) return;
        let existingId = null;
        for (let id in conversations) {
            if (conversations[id].model === model) {
                existingId = id;
                break;
            }
        }
        if (existingId) {
            currentConvId = existingId;
            save();
            renderHistory();
            renderChat();
        } else {
            // Yeni sohbet oluştur
            const type = chatTypeSelect.value;
            const id = String(nextId++);
            conversations[id] = {
                title: model,
                model: model,
                type: type,
                messages: [{ role: 'system', content: 'Sistem: Yeni sohbet (' + model + ') başladı. Tip: ' + type }]
            };
            currentConvId = id;
            save();
            renderHistory();
            renderChat();
        }
        modelSelect.value = model;
    };

    function toBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = reject;
        });
    }

    selectImageBtn.onclick = () => imageInput.click();
    imageInput.onchange = async (e) => {
        const files = Array.from(e.target.files);
        for (let file of files) {
            const b64 = await toBase64(file);
            currentImages.push(b64);
            const div = document.createElement('div');
            div.className = 'preview-item';
            const img = document.createElement('img');
            img.src = URL.createObjectURL(file);
            const rm = document.createElement('span');
            rm.className = 'remove-img';
            rm.textContent = '✖';
            rm.onclick = () => {
                const idx = currentImages.indexOf(b64);
                if (idx !== -1) {
                    currentImages.splice(idx, 1);
                    div.remove();
                }
            };
            div.appendChild(img);
            div.appendChild(rm);
            previewContainer.appendChild(div);
        }
        previewContainer.style.display = 'flex';
    };

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });
    dropZone.addEventListener('drop', async (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const files = Array.from(e.dataTransfer.files);
        for (let file of files) {
            if (file.type.startsWith('image/')) {
                const b64 = await toBase64(file);
                currentImages.push(b64);
                const div = document.createElement('div');
                div.className = 'preview-item';
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                const rm = document.createElement('span');
                rm.className = 'remove-img';
                rm.textContent = '✖';
                rm.onclick = () => {
                    const idx = currentImages.indexOf(b64);
                    if (idx !== -1) {
                        currentImages.splice(idx, 1);
                        div.remove();
                    }
                };
                div.appendChild(img);
                div.appendChild(rm);
                previewContainer.appendChild(div);
            }
        }
        if (currentImages.length > 0) previewContainer.style.display = 'flex';
    });

    excelBtn.onclick = async () => {
        if (currentImages.length === 0) {
            addMessage('system', 'Lütfen önce bir görsel seçin.');
            return;
        }
        isLoading = true;
        excelBtn.disabled = true;
        try {
            const model = conversations[currentConvId]?.model || 'moondream:latest';
            const res = await fetch('/image-to-excel', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model, image: currentImages[0] })
            });
            if (res.ok) {
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'tablo.xlsx';
                a.click();
                URL.revokeObjectURL(url);
                addMessage('system', 'Excel dosyası indiriliyor...');
            } else {
                const err = await res.json();
                addMessage('system', 'Hata: ' + err.error);
            }
        } catch (e) {
            addMessage('system', 'Excel hatası: ' + e.message);
        } finally {
            isLoading = false;
            excelBtn.disabled = false;
        }
    };

    pdfBtn.onclick = () => pdfInput.click();
    pdfInput.onchange = async () => {
        const file = pdfInput.files[0];
        if (file) {
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/upload-pdf', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.text) {
                addMessage('system', 'PDF içeriği (' + data.pages + ' sayfa):\n' + data.text.substring(0, 500) + '...');
            }
        }
    };

    async function sendMessage() {
        if (isLoading) return;
        const prompt = promptEl.value.trim();
        if (!prompt && currentImages.length === 0) return;
        let userMsg = prompt || ('Görsel' + (currentImages.length > 1 ? 'ler' : '') + ' hakkında yorum yap');
        addMessage('user', userMsg + (currentImages.length ? ' [' + currentImages.length + ' görsel]' : ''));
        promptEl.value = '';
        isLoading = true;
        sendBtn.disabled = true;
        sendBtn.textContent = 'Düşünüyor...';
        const conv = conversations[currentConvId];
        const model = conv.model || 'moondream:latest';
        const hasImages = currentImages.length > 0;
        const url = hasImages ? '/chat-multi-image' : '/chat';
        const body = hasImages ? { prompt: userMsg, model, images: currentImages } : { prompt: userMsg, model };
        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            addMessage('assistant', data.response);
            if (hasImages) {
                currentImages = [];
                previewContainer.innerHTML = '';
                previewContainer.style.display = 'none';
                imageInput.value = '';
            }
        } catch (e) {
            addMessage('system', 'Hata: ' + e.message);
        } finally {
            isLoading = false;
            sendBtn.disabled = false;
            sendBtn.textContent = 'Gönder';
            promptEl.focus();
        }
    }

    promptEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            if (!isLoading) sendMessage();
        }
    });
    sendBtn.onclick = sendMessage;
    newChatBtn.onclick = () => { if (!isLoading) { const model = modelSelect.value; if (model) createNewChat(); else alert('Lütfen bir model seçin.'); } };

    themeToggle.onclick = () => {
        dark = !dark;
        document.body.style.background = dark ? '#0f0f13' : '#f0f0f0';
        document.body.style.color = dark ? '#e0e0e0' : '#111';
        themeToggle.innerHTML = dark ? '🌓 Tema' : '☀️ Tema';
    };

    (async function init() {
        await loadModels();
        loadConversations();
        if (!currentConvId || !conversations[currentConvId]) {
            createNewChat();
        }
    })();
})();
</script>
</body>
</html>
