<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yerel AI Studio V3</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; font-size:1.05rem; }
        body { background:#0f0f13; color:#e0e0e0; display:flex; height:100vh; overflow:hidden; }
        #sidebar { width:340px; background:#14141c; border-right:1px solid #2a2a32; display:flex; flex-direction:column; padding:16px; overflow-y:auto; }
        #sidebar h2 { font-size:1.4rem; margin-bottom:12px; }
        #newChatBtn { padding:10px; background:#2b6e9e; border:none; border-radius:40px; color:white; font-weight:bold; cursor:pointer; margin-bottom:16px; font-size:1.1rem; }
        #historyList { flex:1; overflow-y:auto; }
        .hist-item { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; margin:4px 0; background:#1e1e26; border-radius:12px; cursor:pointer; }
        .hist-item.active { background:#2b6e9e; }
        .hist-item .del { background:none; border:none; color:#ff8888; cursor:pointer; font-size:1rem; padding:0 4px; }
        .hist-item .last-msg { font-size:0.8rem; color:#999; margin-top:2px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; max-width:180px; }
        .hist-item .model-name { font-weight:bold; }
        #main { flex:1; display:flex; flex-direction:column; }
        #topbar { padding:12px 20px; background:#14141c; border-bottom:1px solid #2a2a32; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
        #topbar .chat-info { display:flex; align-items:center; gap:10px; font-size:1.2rem; }
        #topbar .right-tools { display:flex; align-items:center; gap:8px; }
        #modelSelect { background:#2a2a32; border:1px solid #3a3a44; color:white; padding:8px 14px; border-radius:40px; font-size:1rem; min-width:180px; }
        #themeToggle { background:#5a4a2e; border:none; color:white; padding:8px 14px; border-radius:40px; cursor:pointer; font-size:1rem; }
        #chatBox { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px; }
        .msg { max-width:80%; padding:12px 18px; border-radius:24px; word-wrap:break-word; font-size:1.1rem; }
        .user { align-self:flex-end; background:#1e4a6b; color:white; }
        .assistant { align-self:flex-start; background:#2d2d35; }
        .system { align-self:center; background:#4a2e2e; color:#ffb4a2; font-size:0.9rem; max-width:90%; text-align:center; }
        #inputArea { padding:16px; background:#15151b; border-top:1px solid #2c2c34; display:flex; flex-direction:column; gap:12px; }
        .input-row { display:flex; gap:12px; align-items:flex-end; }
        #prompt { flex:1; background:#0c0c10; border:1px solid #3a3a44; border-radius:24px; padding:14px; color:white; resize:vertical; font-size:1.1rem; }
        button { background:#2b6e9e; border:none; border-radius:40px; color:white; padding:0 24px; height:48px; cursor:pointer; font-weight:bold; font-size:1.1rem; }
        .image-preview { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; background:#0c0c10; padding:8px; border-radius:16px; }
        .preview-item { position:relative; display:inline-block; }
        .preview-item img { height:60px; border-radius:8px; }
        .remove-img { position:absolute; top:-8px; right:-8px; background:#8b5a2b; border-radius:50%; width:22px; height:22px; font-size:14px; padding:0; line-height:22px; text-align:center; cursor:pointer; }
        .tool-btn { background:#2e7d5e; }
        .drop-zone { border:2px dashed #3a3a44; border-radius:20px; padding:20px; text-align:center; color:#aaa; margin-top:8px; cursor:pointer; transition:0.2s; font-size:1rem; }
        .drop-zone.dragover { background:#2a2a32; border-color:#2b6e9e; }
        @media (max-width:700px) { #sidebar { width:220px; } .msg { max-width:95%; } }
    </style>
</head>
<body>
<div id="sidebar">
    <h2>ðŸ’¬ Sohbetler</h2>
    <button id="newChatBtn">+ Yeni Sohbet</button>
    <div id="historyList"></div>
</div>
<div id="main">
    <div id="topbar">
        <div class="chat-info">
            <span id="chatTitle">Sohbet</span>
        </div>
        <div class="right-tools">
            <select id="modelSelect"></select>
            <button id="themeToggle">ðŸŒ“ Tema</button>
        </div>
    </div>
    <div id="chatBox">
        <div class="msg system">Sistem: HoÅŸ geldiniz! Sol menÃ¼den bir sohbet seÃ§in veya yeni sohbet baÅŸlatÄ±n.</div>
    </div>
    <div id="inputArea">
        <div class="input-row">
            <textarea id="prompt" rows="2" placeholder="Mesaj yaz... (Enter gÃ¶nder, Shift+Enter satÄ±r atlar)"></textarea>
            <button id="sendBtn">GÃ¶nder</button>
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <input type="file" id="imageInput" accept="image/*" multiple style="display:none">
            <button id="selectImageBtn">ðŸ“· GÃ¶rsel SeÃ§</button>
            <button id="excelBtn" class="tool-btn">ðŸ“Š Excel Yap</button>
            <button id="pdfBtn" class="tool-btn">ðŸ“„ PDF YÃ¼kle</button>
        </div>
        <div id="imagePreviewContainer" class="image-preview" style="display:none;"></div>
        <div id="dropZone" class="drop-zone">ðŸ“¸ GÃ¶rseli buraya sÃ¼rÃ¼kleyin veya yapÄ±ÅŸtÄ±rÄ±n</div>
        <input type="file" id="pdfInput" accept=".pdf" style="display:none">
    </div>
</div>
<script>
(function(){
    let isLoading = false;
    let currentImages = [];
    let conversations = {};
    let currentConvId = null;
    let nextId = 1;
    let dark = true;

    const chatBox = document.getElementById('chatBox');
    const promptEl = document.getElementById('prompt');
    const sendBtn = document.getElementById('sendBtn');
    const modelSelect = document.getElementById('modelSelect');
    const historyList = document.getElementById('historyList');
    const newChatBtn = document.getElementById('newChatBtn');
    const themeToggle = document.getElementById('themeToggle');
    const imageInput = document.getElementById('imageInput');
    const selectImageBtn = document.getElementById('selectImageBtn');
    const excelBtn = document.getElementById('excelBtn');
    const pdfBtn = document.getElementById('pdfBtn');
    const pdfInput = document.getElementById('pdfInput');
    const previewContainer = document.getElementById('imagePreviewContainer');
    const chatTitle = document.getElementById('chatTitle');
    const dropZone = document.getElementById('dropZone');

    function save() {
        localStorage.setItem('convs', JSON.stringify(conversations));
        localStorage.setItem('currentId', currentConvId);
        localStorage.setItem('nextId', nextId);
    }

    function loadConversations() {
        const saved = localStorage.getItem('convs');
        if (saved) {
            conversations = JSON.parse(saved);
            currentConvId = localStorage.getItem('currentId');
            nextId = parseInt(localStorage.getItem('nextId')) || 1;
            if (!currentConvId || !conversations[currentConvId]) {
                const ids = Object.keys(conversations);
                currentConvId = ids.length ? ids[0] : null;
                if (!currentConvId) createNewChat();
            }
        } else {
            createNewChat();
        }
        renderHistory();
        renderChat();
    }

        function createNewChat() {
        const model = modelSelect.value || 'moondream:latest';
        const id = String(nextId++);
        conversations[id] = {
            title: model,
            model: model,
            messages: [{ role: 'system', content: 'Sistem: Yeni sohbet (' + model + ') başladı.' }]
        };
        currentConvId = id;
        save();
        renderHistory();
        renderChat();
        modelSelect.value = model;
    }]
        };
        currentConvId = id;
        save();
        renderHistory();
        renderChat();
        modelSelect.value = model;
    }

    function deleteChat(id) {
        if (id === currentConvId) {
            const ids = Object.keys(conversations).filter(i => i !== id);
            currentConvId = ids.length ? ids[0] : null;
            if (!currentConvId) createNewChat();
        }
        delete conversations[id];
        save();
        renderHistory();
        if (currentConvId) renderChat();
    }

        function renderHistory() {
        historyList.innerHTML = '';
        // Modelleri grupla
        const modelMap = {};
        const ids = Object.keys(conversations).reverse();
        for (let id of ids) {
            const conv = conversations[id];
            const model = conv.model || 'bilinmiyor';
            if (!modelMap[model]) {
                modelMap[model] = { id: id, model: model, lastMsg: conv.messages.length ? conv.messages[conv.messages.length-1].content : '' };
            } else {
                // Aynı model varsa, en son mesajı güncelle
                const last = conv.messages.length ? conv.messages[conv.messages.length-1].content : '';
                if (last) modelMap[model].lastMsg = last;
                // En son id'yi al (en güncel sohbeti temsil etsin)
                modelMap[model].id = id;
            }
        }
        // Modele göre sırala (alfabetik)
        const sortedModels = Object.keys(modelMap).sort();
        for (let model of sortedModels) {
            const item = modelMap[model];
            const id = item.id;
            const conv = conversations[id];
            const lastMsg = conv.messages.length ? conv.messages[conv.messages.length-1].content : '';
            const snippet = lastMsg.length > 30 ? lastMsg.substring(0, 30) + '…' : lastMsg;
            const div = document.createElement('div');
            div.className = 'hist-item' + (id === currentConvId ? ' active' : '');
            const infoDiv = document.createElement('div');
            infoDiv.style.display = 'flex';
            infoDiv.style.flexDirection = 'column';
            infoDiv.style.flex = '1';
            const nameSpan = document.createElement('span');
            nameSpan.className = 'model-name';
            // Model adının yanına (yerel) etiketi ekle
            nameSpan.textContent = model + ' (yerel)';
            const msgSpan = document.createElement('span');
            msgSpan.className = 'last-msg';
            msgSpan.textContent = snippet || 'Yeni sohbet';
            infoDiv.appendChild(nameSpan);
            infoDiv.appendChild(msgSpan);
            const delBtn = document.createElement('button');
            delBtn.className = 'del';
            delBtn.textContent = '🗑️';
            delBtn.onclick = (function(id) {
                return function(e) {
                    e.stopPropagation();
                    if (confirm('Bu sohbet silinsin mi?')) deleteChat(id);
                };
            })(id);
            div.appendChild(infoDiv);
            div.appendChild(delBtn);
            div.onclick = (function(id) {
                return function() {
                    if (isLoading) return;
                    currentConvId = id;
                    save();
                    renderHistory();
                    renderChat();
                    modelSelect.value = conversations[id].model || 'moondream:latest';
                };
            })(id);
            historyList.appendChild(div);
        }
    };
            })(id);
            div.appendChild(infoDiv);
            div.appendChild(delBtn);
            div.onclick = (function(id) {
                return function() {
                    if (isLoading) return;
                    currentConvId = id;
                    save();
                    renderHistory();
                    renderChat();
                    modelSelect.value = conversations[id].model || 'moondream:latest';
                };
            })(id);
            historyList.appendChild(div);
        }
    }

    function renderChat() {
        if (!currentConvId || !conversations[currentConvId]) {
            chatBox.innerHTML = '<div class="msg system">Sistem: LÃ¼tfen bir sohbet seÃ§in.</div>';
            chatTitle.textContent = 'Sohbet';
            return;
        }
        const conv = conversations[currentConvId];
        const messages = conv.messages || [];
        chatBox.innerHTML = '';
        for (let msg of messages) {
            const div = document.createElement('div');
            div.className = 'msg ' + msg.role;
            div.textContent = msg.content;
            chatBox.appendChild(div);
        }
        chatBox.scrollTop = chatBox.scrollHeight;
        chatTitle.textContent = conv.model || 'Sohbet';
        modelSelect.value = conv.model || 'moondream:latest';
    }

    function addMessage(role, content) {
        if (!currentConvId) createNewChat();
        const conv = conversations[currentConvId];
        conv.messages.push({ role: role, content: content });
        save();
        renderChat();
        renderHistory();
    }

    async function loadModels() {
        try {
            const res = await fetch('/models');
            const data = await res.json();
            const models = data.length ? data : ['moondream:latest'];
            modelSelect.innerHTML = '';
            for (let m of models) {
                const opt = document.createElement('option');
                opt.value = m;
                let label = m;
                if (m.includes('moondream')) label = 'ðŸ–¼ï¸ ' + m + ' (GÃ¶rsel)';
                opt.textContent = label;
                modelSelect.appendChild(opt);
            }
            const conv = conversations[currentConvId];
            if (conv && conv.model) {
                modelSelect.value = conv.model;
            } else {
                modelSelect.value = models[0] || 'moondream:latest';
            }
        } catch (e) {
            console.error('Model listesi alÄ±namadÄ±:', e);
            modelSelect.innerHTML = '<option>moondream:latest</option>';
            modelSelect.value = 'moondream:latest';
        }
    }

        modelSelect.onchange = function() {
        const model = this.value;
        if (!model) return;
        let existingId = null;
        for (let id in conversations) {
            if (conversations[id].model === model) {
                existingId = id;
                break;
            }
        }
        if (existingId) {
            currentConvId = existingId;
            save();
            renderHistory();
            renderChat();
        } else {
            // Yeni sohbet oluştur
            const id = String(nextId++);
            conversations[id] = {
                title: model,
                model: model,
                messages: [{ role: 'system', content: 'Sistem: Yeni sohbet (' + model + ') başladı.' }]
            };
            currentConvId = id;
            save();
            renderHistory();
            renderChat();
        }
        modelSelect.value = model;
    };
        }
        if (existingId) {
            currentConvId = existingId;
            save();
            renderHistory();
            renderChat();
        } else {
            const id = String(nextId++);
            conversations[id] = {
                title: model,
                model: model,
                messages: [{ role: 'system', content: 'Sistem: Yeni sohbet (' + model + ') baÅŸladÄ±.' }]
            };
            currentConvId = id;
            save();
            renderHistory();
            renderChat();
        }
        modelSelect.value = model;
    };

    function toBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = reject;
        });
    }

    selectImageBtn.onclick = () => imageInput.click();
    imageInput.onchange = async function(e) {
        const files = Array.from(e.target.files);
        for (let file of files) {
            const b64 = await toBase64(file);
            currentImages.push(b64);
            const div = document.createElement('div');
            div.className = 'preview-item';
            const img = document.createElement('img');
            img.src = URL.createObjectURL(file);
            const rm = document.createElement('span');
            rm.className = 'remove-img';
            rm.textContent = 'âœ–';
            rm.onclick = function(idx) {
                return function() {
                    currentImages.splice(idx, 1);
                    div.remove();
                };
            }(currentImages.length - 1);
            div.appendChild(img);
            div.appendChild(rm);
            previewContainer.appendChild(div);
        }
        previewContainer.style.display = 'flex';
    };

    dropZone.addEventListener('dragover', function(e) {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', function() {
        dropZone.classList.remove('dragover');
    });
    dropZone.addEventListener('drop', async function(e) {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const files = Array.from(e.dataTransfer.files);
        for (let file of files) {
            if (file.type.startsWith('image/')) {
                const b64 = await toBase64(file);
                currentImages.push(b64);
                const div = document.createElement('div');
                div.className = 'preview-item';
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                const rm = document.createElement('span');
                rm.className = 'remove-img';
                rm.textContent = 'âœ–';
                rm.onclick = function(idx) {
                    return function() {
                        currentImages.splice(idx, 1);
                        div.remove();
                    };
                }(currentImages.length - 1);
                div.appendChild(img);
                div.appendChild(rm);
                previewContainer.appendChild(div);
            }
        }
        if (currentImages.length > 0) previewContainer.style.display = 'flex';
    });

    excelBtn.onclick = async function() {
        if (currentImages.length === 0) {
            addMessage('system', 'LÃ¼tfen Ã¶nce bir gÃ¶rsel seÃ§in.');
            return;
        }
        isLoading = true;
        excelBtn.disabled = true;
        try {
            const model = conversations[currentConvId] ? conversations[currentConvId].model : 'moondream:latest';
            const res = await fetch('/image-to-excel', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: model, image: currentImages[0] })
            });
            if (res.ok) {
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'tablo.xlsx';
                a.click();
                URL.revokeObjectURL(url);
                addMessage('system', 'Excel dosyasÄ± indiriliyor...');
            } else {
                const err = await res.json();
                addMessage('system', 'Hata: ' + err.error);
            }
        } catch (e) {
            addMessage('system', 'Excel hatasÄ±: ' + e.message);
        } finally {
            isLoading = false;
            excelBtn.disabled = false;
        }
    };

    pdfBtn.onclick = () => pdfInput.click();
    pdfInput.onchange = async function() {
        const file = pdfInput.files[0];
        if (file) {
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/upload-pdf', { method: 'POST', body: formData });
            const data = await res.json();
            if (data.text) {
                addMessage('system', 'PDF iÃ§eriÄŸi (' + data.pages + ' sayfa):\n' + data.text.substring(0, 500) + '...');
            }
        }
    };

    async function sendMessage() {
        if (isLoading) return;
        const prompt = promptEl.value.trim();
        if (!prompt && currentImages.length === 0) return;
        const userMsg = prompt || ('GÃ¶rsel' + (currentImages.length > 1 ? 'ler' : '') + ' hakkÄ±nda yorum yap');
        addMessage('user', userMsg + (currentImages.length ? ' [' + currentImages.length + ' gÃ¶rsel]' : ''));
        promptEl.value = '';
        isLoading = true;
        sendBtn.disabled = true;
        sendBtn.textContent = 'DÃ¼ÅŸÃ¼nÃ¼yor...';
        const conv = conversations[currentConvId];
        const model = conv.model || 'moondream:latest';
        const hasImages = currentImages.length > 0;
        const url = hasImages ? '/chat-multi-image' : '/chat';
        const body = hasImages ? { prompt: userMsg, model: model, images: currentImages } : { prompt: userMsg, model: model };
        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            addMessage('assistant', data.response);
            if (hasImages) {
                currentImages = [];
                previewContainer.innerHTML = '';
                previewContainer.style.display = 'none';
                imageInput.value = '';
            }
        } catch (e) {
            addMessage('system', 'Hata: ' + e.message);
        } finally {
            isLoading = false;
            sendBtn.disabled = false;
            sendBtn.textContent = 'GÃ¶nder';
            promptEl.focus();
        }
    }

    promptEl.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            if (!isLoading) sendMessage();
        }
    });
    sendBtn.onclick = function() { if (!isLoading) sendMessage(); };
        newChatBtn.onclick = function() {
        if (isLoading) return;
        const model = modelSelect.value;
        if (!model) {
            alert('Lütfen bir model seçin.');
            return;
        }
        // Aynı modelde zaten bir sohbet var mı?
        let existingId = null;
        for (let id in conversations) {
            if (conversations[id].model === model) {
                existingId = id;
                break;
            }
        }
        if (existingId) {
            alert('Bu modelle zaten bir sohbet var. Lütfen sol menüden seçin.');
            currentConvId = existingId;
            save();
            renderHistory();
            renderChat();
            return;
        }
        createNewChat();
    }; };

    themeToggle.onclick = function() {
        dark = !dark;
        document.body.style.background = dark ? '#0f0f13' : '#f0f0f0';
        document.body.style.color = dark ? '#e0e0e0' : '#111';
        themeToggle.innerHTML = dark ? 'ðŸŒ“ Tema' : 'â˜€ï¸ Tema';
    };

    (async function init() {
        await loadModels();
        loadConversations();
        if (!currentConvId || !conversations[currentConvId]) {
            createNewChat();
        }
    })();
})();
</script>
</body>
</html>
