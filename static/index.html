<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yerel AI Studio V3</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui; font-size:1.05rem; }
        body { background:#0f0f13; color:#e0e0e0; height:100vh; overflow:hidden; }

        #sidebar {
            width:300px;
            position:fixed; top:0; left:0; height:100vh; z-index:100;
            background:#14141c; border-right:1px solid #2a2a32;
            display:flex; flex-direction:column; padding:16px; overflow-y:auto;
            transition: transform 0.3s ease;
            transform: translateX(0);
        }
        #sidebar.collapsed { transform: translateX(-100%); }
        #sidebar h2 { margin-bottom:12px; font-size:1.3rem; }
        #newChatBtn { padding:10px; background:#2b6e9e; border:none; border-radius:40px; color:white; font-weight:bold; cursor:pointer; margin-bottom:12px; font-size:1.05rem; }

        #sidebarModelLabel { font-size:0.85rem; color:#999; margin-bottom:4px; }
        #modelSelect { width:100%; background:#2a2a32; border:1px solid #3a3a44; color:white; padding:8px 12px; border-radius:14px; font-size:0.95rem; margin-bottom:16px; }

        #historyList { flex:1; overflow-y:auto; }
        .hist-item { display:flex; justify-content:space-between; align-items:center; padding:8px 12px; margin:4px 0; background:#1e1e26; border-radius:12px; cursor:pointer; font-size:1rem; }
        .hist-item.active { background:#2b6e9e; }
        .hist-item .model-name { font-weight:bold; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
        .hist-item .type-tag { font-size:0.65rem; padding:1px 7px; border-radius:10px; font-weight:bold; }
        .type-tag.local { background:#1e4a3a; color:#7de3b3; }
        .type-tag.cloud { background:#3a2e5a; color:#c9a8ff; }
        .type-tag.research { background:#4a3416; color:#f0a868; }
        .hist-item .last-msg { font-size:0.8rem; color:#999; margin-top:2px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; max-width:200px; }
        .hist-item .del { background:none; border:none; color:#ff8888; cursor:pointer; font-size:1rem; padding:0 4px; }

        .hist-item.pending .model-name::after { content:' ⏳'; }
        @keyframes newReplyPulse {
            0%, 100% { background:#1e1e26; box-shadow:none; }
            50% { background:#1c3d2a; box-shadow:0 0 0 2px rgba(52,199,122,0.35); }
        }
        .hist-item.new-reply { animation: newReplyPulse 1.1s ease-in-out infinite; }
        .hist-item.new-reply .model-name::before { content:'🟢 '; }

        #main { margin-left:300px; display:flex; flex-direction:column; height:100vh; transition: margin-left 0.3s ease; }
        #main.expanded { margin-left:0; }

        #topbar { padding:12px 20px; background:#14141c; border-bottom:1px solid #2a2a32; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
        #topbar .chat-info { display:flex; align-items:center; gap:10px; font-size:1.1rem; }
        #sidebarToggle { background:#2a2a32; border:none; color:white; width:38px; height:38px; border-radius:10px; cursor:pointer; font-size:1.2rem; flex-shrink:0; }
        #currentModelTag { font-size:0.75rem; padding:2px 10px; border-radius:20px; font-weight:bold; }
        #topbar .right-tools { display:flex; align-items:center; gap:8px; }
        #themeToggle { background:#5a4a2e; border:none; color:white; padding:6px 12px; border-radius:40px; cursor:pointer; font-size:1rem; }

        #statusBar { display:flex; gap:6px; }
        .status-pill { font-size:0.7rem; padding:3px 10px; border-radius:20px; font-weight:bold; display:inline-flex; align-items:center; gap:5px; }
        .status-pill::before { content:'●'; font-size:0.6rem; }
        .status-pill.ok { background:#1e4a3a; color:#7de3b3; }
        .status-pill.ok::before { color:#34c77a; }
        .status-pill.down { background:#4a2e2e; color:#ffb4a2; }
        .status-pill.down::before { color:#ff6b6b; }

        #chatBox { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px; scroll-behavior:smooth; }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
        .msg-wrapper { display:flex; flex-direction:column; max-width:80%; animation: fadeInUp 0.25s ease; }
        .msg-wrapper.user { align-self:flex-end; align-items:flex-end; }
        .msg-wrapper.assistant { align-self:flex-start; align-items:flex-start; }
        .msg-wrapper.system { align-self:center; align-items:center; max-width:90%; }
        .model-badge { font-size:0.7rem; padding:2px 10px; border-radius:20px; margin-bottom:4px; font-weight:bold; }
        .model-badge.local { background:#1e4a3a; color:#7de3b3; }
        .model-badge.cloud { background:#3a2e5a; color:#c9a8ff; }
        .model-badge.research { background:#4a3416; color:#f0a868; }
        .model-badge.user-badge { opacity:0.75; }
        .msg { padding:10px 16px; border-radius:24px; word-wrap:break-word; font-size:1rem; white-space:pre-wrap; }
        .user .msg { background:#1e4a6b; color:white; }
        .assistant .msg { background:#2d2d35; }
        .system .msg { background:#4a2e2e; color:#ffb4a2; font-size:0.9rem; text-align:center; }

        .typing-indicator .msg { display:flex; gap:5px; align-items:center; padding:12px 16px; }
        .typing-dot { width:6px; height:6px; border-radius:50%; background:#999; animation: typingBlink 1s infinite ease-in-out; }
        .typing-dot:nth-child(2) { animation-delay:0.15s; }
        .typing-dot:nth-child(3) { animation-delay:0.3s; }
        @keyframes typingBlink { 0%,80%,100% { opacity:0.2; } 40% { opacity:1; } }

        #inputArea { padding:16px; background:#15151b; border-top:1px solid #2c2c34; display:flex; flex-direction:column; gap:12px; }
        .input-row { display:flex; gap:12px; align-items:flex-end; }
        #prompt { flex:1; background:#0c0c10; border:1px solid #3a3a44; border-radius:24px; padding:12px; color:white; resize:vertical; font-size:1.1rem; }
        button { background:#2b6e9e; border:none; border-radius:40px; color:white; padding:0 20px; height:44px; cursor:pointer; font-weight:bold; font-size:1rem; }
        button:disabled { opacity:0.6; cursor:not-allowed; }
        .image-preview { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; background:#0c0c10; padding:8px; border-radius:16px; }
        .preview-item { position:relative; }
        .preview-item img { height:60px; border-radius:8px; }
        .remove-img { position:absolute; top:-8px; right:-8px; background:#8b5a2b; border-radius:50%; width:20px; height:20px; font-size:12px; padding:0; line-height:20px; text-align:center; cursor:pointer; }
        .tool-btn { background:#2e7d5e; }

        @media (max-width:700px) {
            #sidebar { width:270px; }
            #main { margin-left:0 !important; }
            .msg-wrapper { max-width:95%; }
        }
    </style>
</head>
<body>
<div id="sidebar">
    <h2>💬 Sohbetler</h2>
    <button id="newChatBtn">+ Yeni Sohbet</button>
    <div id="sidebarModelLabel">Model seç</div>
    <select id="modelSelect"></select>
    <div id="historyList"></div>
</div>
<div id="main">
    <div id="topbar">
        <div class="chat-info">
            <button id="sidebarToggle">☰</button>
            <span id="chatTitle">Sohbet</span>
            <span id="currentModelTag"></span>
        </div>
        <div class="right-tools">
            <div id="statusBar" class="status-bar"></div>
            <button id="themeToggle">🌓 Tema</button>
        </div>
    </div>
    <div id="chatBox">
        <div class="msg-wrapper system"><div class="msg">Sistem: Hoş geldiniz! Sol menüden bir model/sohbet seçin veya yeni sohbet başlatın.</div></div>
    </div>
    <div id="inputArea">
        <div class="input-row">
            <textarea id="prompt" rows="2" placeholder="Mesaj yaz... (Enter gönder, Shift+Enter satır atlar)"></textarea>
            <button id="sendBtn">Gönder</button>
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <input type="file" id="imageInput" accept="image/*" multiple style="display:none">
            <button id="selectImageBtn">📷 Görsel Seç</button>
            <button id="excelBtn" class="tool-btn">📊 Excel Yap</button>
            <button id="pdfBtn" class="tool-btn">📄 PDF Yükle</button>
        </div>
        <div id="imagePreviewContainer" class="image-preview" style="display:none;"></div>
        <input type="file" id="pdfInput" accept=".pdf" style="display:none">
    </div>
</div>
<script>
(function(){
    'use strict';
    let currentImages = [], conversations = {}, currentConvId = null, nextId = 1, dark = true, sidebarOpen = true, toolBusy = false;

    const chatBox = document.getElementById('chatBox'), promptEl = document.getElementById('prompt'), sendBtn = document.getElementById('sendBtn');
    const modelSelect = document.getElementById('modelSelect'), historyList = document.getElementById('historyList'), newChatBtn = document.getElementById('newChatBtn');
    const themeToggle = document.getElementById('themeToggle');
    const imageInput = document.getElementById('imageInput'), selectImageBtn = document.getElementById('selectImageBtn');
    const excelBtn = document.getElementById('excelBtn'), pdfBtn = document.getElementById('pdfBtn'), pdfInput = document.getElementById('pdfInput');
    const previewContainer = document.getElementById('imagePreviewContainer'), chatTitle = document.getElementById('chatTitle');
    const sidebar = document.getElementById('sidebar'), mainEl = document.getElementById('main'), sidebarToggle = document.getElementById('sidebarToggle');
    const currentModelTag = document.getElementById('currentModelTag');
    const statusBar = document.getElementById('statusBar');

    // ---- Yerel / bulut / arastirma model yardimcilari ----
    function modelKind(model) {
        if (model === 'web-arastirmaci') return 'research';
        if (model && (model.startsWith('gemini') || model === 'kimi-k3')) return 'cloud';
        return 'local';
    }
    function modelIcon(kind) {
        return kind === 'research' ? '🔎' : (kind === 'cloud' ? '☁️' : '🖥️');
    }
    function modelDisplayName(model) {
        if (model === 'gemini-2.5-flash') return 'Gemini 2.5 Flash';
        if (model === 'kimi-k3') return 'Kimi K3';
        if (model === 'web-arastirmaci') return 'Web Araştırmacı';
        return model;
    }

    // ---- Sidebar slide toggle ----
    function setSidebarOpen(open) {
        sidebarOpen = open;
        sidebar.classList.toggle('collapsed', !open);
        mainEl.classList.toggle('expanded', !open);
    }
    sidebarToggle.onclick = () => setSidebarOpen(!sidebarOpen);
    if (window.innerWidth <= 700) setSidebarOpen(false);

    // ---- Baglanti durumu (Ollama / Gemini) ----
    async function updateStatus() {
        try {
            const res = await fetch('/status');
            const data = await res.json();
            renderStatus(data);
        } catch (e) {
            renderStatus({ ollama: false, gemini: false });
        }
    }

    function renderStatus(data) {
        statusBar.innerHTML = '';

        const ollamaPill = document.createElement('span');
        ollamaPill.className = 'status-pill ' + (data.ollama ? 'ok' : 'down');
        ollamaPill.textContent = '🖥️ Ollama';
        ollamaPill.title = data.ollama ? 'Ollama servisi çalışıyor' : 'Ollama servisine ulaşılamıyor';
        statusBar.appendChild(ollamaPill);

        const usage = data.cloud_usage_today || {};

        const geminiPill = document.createElement('span');
        geminiPill.className = 'status-pill ' + (data.gemini ? 'ok' : 'down');
        const geminiCount = usage['gemini-2.5-flash'] || 0;
        geminiPill.textContent = '☁️ Gemini' + (geminiCount ? ' (' + geminiCount + ')' : '');
        geminiPill.title = data.gemini
            ? `GEMINI_API_KEY tanımlı — bugün ${geminiCount} istek gönderildi`
            : 'GEMINI_API_KEY tanımlı değil (.env dosyasını kontrol edin)';
        statusBar.appendChild(geminiPill);

        if (data.kimi !== undefined) {
            const kimiPill = document.createElement('span');
            kimiPill.className = 'status-pill ' + (data.kimi ? 'ok' : 'down');
            const kimiCount = usage['kimi-k3'] || 0;
            kimiPill.textContent = '☁️ Kimi' + (kimiCount ? ' (' + kimiCount + ')' : '');
            kimiPill.title = data.kimi
                ? `KIMI_API_KEY tanımlı — bugün ${kimiCount} istek gönderildi`
                : 'KIMI_API_KEY tanımlı değil';
            statusBar.appendChild(kimiPill);
        }
    }

    updateStatus();
    setInterval(updateStatus, 15000);

    // ---- Model isitma (onceden belleğe yukleme) ----
    function warmupModel(model) {
        if (!model || modelKind(model) !== 'local') return;
        fetch('/warmup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model })
        }).catch(() => {});
    }

    function generateTitle(messages) {
        const first = messages.find(m => m.role === 'user');
        if (first && first.content) {
            let t = first.content;
            if (t.length > 30) t = t.substring(0, 30) + '…';
            return t;
        }
        return 'Yeni Sohbet';
    }

    function save() {
        localStorage.setItem('convs', JSON.stringify(conversations));
        localStorage.setItem('currentId', currentConvId);
        localStorage.setItem('nextId', nextId);
        // Sunucuya da yedekle (arka planda, sessizce - basarisiz olursa onemli degil)
        fetch('/save-conversations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ conversations, currentConvId, nextId })
        }).catch(() => {});
    }

    async function loadConversations() {
        const saved = localStorage.getItem('convs');
        if (saved) {
            conversations = JSON.parse(saved);
            currentConvId = localStorage.getItem('currentId');
            nextId = parseInt(localStorage.getItem('nextId')) || 1;
            if (!currentConvId || !conversations[currentConvId]) {
                const ids = Object.keys(conversations);
                currentConvId = ids.length ? ids[0] : null;
                if (!currentConvId) createNewChat();
            }
        } else {
            // Tarayici hafizasi bossa, sunucudaki yedegi dene
            let restored = false;
            try {
                const res = await fetch('/load-conversations');
                const data = await res.json();
                if (data.found && data.data && data.data.conversations) {
                    conversations = data.data.conversations;
                    currentConvId = data.data.currentConvId;
                    nextId = data.data.nextId || 1;
                    restored = true;
                }
            } catch (e) { /* yedek yoksa sorun degil */ }
            if (!restored) createNewChat();
        }
        renderHistory();
        renderChat();
        updateSendButtonState();
    }

    function findConvByModel(model) {
        for (let id in conversations) {
            if (conversations[id].model === model) return id;
        }
        return null;
    }

    function openConversation(id) {
        currentConvId = id;
        if (conversations[id]) conversations[id].hasNewReply = false;
        save();
        renderHistory();
        renderChat();
        updateSendButtonState();
        if (conversations[id]) warmupModel(conversations[id].model);
        if (window.innerWidth <= 700) setSidebarOpen(false);
    }

    function isVisionOnlyModel(model) {
        if (!model) return false;
        const m = model.toLowerCase();
        return (m.includes('moondream') || m.includes('vision') || m.includes('granite')) && modelKind(m) === 'local';
    }

    function createNewChat() {
        const model = modelSelect.value || 'moondream:latest';
        const existingId = findConvByModel(model);
        if (existingId) {
            openConversation(existingId);
            modelSelect.value = model;
            return;
        }
        const id = String(nextId++);
        const initialMessages = [{ role: 'system', content: 'Sistem: Yeni sohbet (' + modelDisplayName(model) + ') başladı.' }];
        if (isVisionOnlyModel(model)) {
            initialMessages.push({
                role: 'system',
                content: 'ℹ️ Bu model görsel (resim) analizi için optimize edilmiştir. Görsel eklemeden sorduğunuz genel sohbet sorularında yanıtları zayıf/tutarsız olabilir.'
            });
        }
        conversations[id] = {
            title: model,
            model: model,
            pending: false,
            hasNewReply: false,
            messages: initialMessages
        };
        openConversation(id);
        modelSelect.value = model;
    }

    function deleteChat(id) {
        if (id === currentConvId) {
            const ids = Object.keys(conversations).filter(i => i !== id);
            currentConvId = ids.length ? ids[0] : null;
        }
        delete conversations[id];
        save();
        if (!currentConvId) createNewChat();
        renderHistory();
        renderChat();
        updateSendButtonState();
    }

    function renderHistory() {
        historyList.innerHTML = '';
        const modelMap = {};
        const ids = Object.keys(conversations);
        for (let id of ids) {
            const conv = conversations[id];
            const model = conv.model || 'bilinmiyor';
            const lastMsg = conv.messages[conv.messages.length - 1]?.content || '';
            modelMap[model] = { id, lastMsg };
        }
        const sortedModels = Object.keys(modelMap).sort();
        for (let model of sortedModels) {
            const { id, lastMsg } = modelMap[model];
            const conv = conversations[id];
            const kind = modelKind(model);
            const div = document.createElement('div');
            div.className = 'hist-item'
                + (id === currentConvId ? ' active' : '')
                + (conv.pending ? ' pending' : '')
                + (conv.hasNewReply ? ' new-reply' : '');

            const infoDiv = document.createElement('div');
            infoDiv.style.display = 'flex';
            infoDiv.style.flexDirection = 'column';
            infoDiv.style.flex = '1';

            const titleSpan = document.createElement('span');
            titleSpan.className = 'model-name';
            const tag = document.createElement('span');
            tag.className = 'type-tag ' + kind;
            tag.textContent = kind === 'research' ? 'ARAŞTIRMA' : (kind === 'cloud' ? 'BULUT' : 'YEREL');
            titleSpan.appendChild(document.createTextNode(modelDisplayName(model) + ' '));
            titleSpan.appendChild(tag);

            const msgSpan = document.createElement('span');
            msgSpan.className = 'last-msg';
            let snippet = lastMsg;
            if (snippet.length > 30) snippet = snippet.substring(0, 30) + '…';
            msgSpan.textContent = snippet;

            infoDiv.appendChild(titleSpan);
            infoDiv.appendChild(msgSpan);

            const delBtn = document.createElement('button');
            delBtn.className = 'del';
            delBtn.textContent = '🗑️';
            delBtn.onclick = (e) => {
                e.stopPropagation();
                if (confirm('Bu sohbet silinsin mi?')) deleteChat(id);
            };

            div.appendChild(infoDiv);
            div.appendChild(delBtn);
            div.onclick = () => {
                openConversation(id);
                modelSelect.value = model;
            };
            historyList.appendChild(div);
        }
    }

    // Akan yanit sirasinda TUM ekrani yeniden cizmek yerine (bu titremeye
    // yol aciyordu, cunku her mesajin 'belirme' animasyonunu tekrar
    // tetikliyordu), sadece o an akan balonun metnini dogrudan gunceller.
    function updateStreamingBubble(conv) {
        const wrapper = document.getElementById('pendingWrapper');
        const badge = document.getElementById('pendingBadge');
        const content = document.getElementById('pendingContent');
        if (!wrapper || !badge || !content) {
            // Balon henuz olusturulmamis (ilk parca) - bir kereligine tam ciz
            renderChat();
            return;
        }
        const streamModel = conv.streamingModel || conv.model;
        const kind = modelKind(streamModel);
        badge.className = 'model-badge ' + kind;
        badge.textContent = modelIcon(kind) + ' ' + modelDisplayName(streamModel);
        content.textContent = conv.streamingText;
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function renderChat() {
        if (!currentConvId || !conversations[currentConvId]) {
            chatBox.innerHTML = '<div class="msg-wrapper system"><div class="msg">Sistem: Lütfen bir sohbet seçin.</div></div>';
            chatTitle.textContent = 'Sohbet';
            currentModelTag.textContent = '';
            return;
        }
        const conv = conversations[currentConvId];
        const messages = conv.messages || [];
        chatBox.innerHTML = '';
        messages.forEach(msg => {
            const wrapper = document.createElement('div');
            wrapper.className = 'msg-wrapper ' + msg.role;

            if (msg.role === 'user') {
                const modelName = conv.model;
                const kind = modelKind(modelName);
                const badge = document.createElement('div');
                badge.className = 'model-badge user-badge ' + kind;
                badge.textContent = '→ ' + modelIcon(kind) + ' ' + modelDisplayName(modelName);
                wrapper.appendChild(badge);
            }

            if (msg.role === 'assistant') {
                const modelName = msg.model || conv.model;
                const kind = modelKind(modelName);
                const badge = document.createElement('div');
                badge.className = 'model-badge ' + kind;
                badge.textContent = modelIcon(kind) + ' ' + modelDisplayName(modelName);
                if (msg.fallback) {
                    badge.textContent += ' (yedek)';
                    badge.title = "'" + modelDisplayName(msg.requestedModel) + "' yanıt vermedi, bu modele geçildi.";
                }
                wrapper.appendChild(badge);
            }

            const div = document.createElement('div');
            div.className = 'msg';
            div.textContent = msg.content;
            wrapper.appendChild(div);
            chatBox.appendChild(wrapper);
        });

        if (conv.pending) {
            const streamModel = conv.streamingModel || conv.model;
            const kind = modelKind(streamModel);
            const wrapper = document.createElement('div');
            wrapper.id = 'pendingWrapper';
            wrapper.className = 'msg-wrapper assistant typing-indicator';
            const badge = document.createElement('div');
            badge.id = 'pendingBadge';
            badge.className = 'model-badge ' + kind;
            badge.textContent = modelIcon(kind) + ' ' + modelDisplayName(streamModel) + (conv.streamingText ? '' : ' yazıyor');
            wrapper.appendChild(badge);
            const div = document.createElement('div');
            div.id = 'pendingContent';
            div.className = 'msg';
            if (conv.streamingText) {
                div.textContent = conv.streamingText;
            } else {
                div.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
            }
            wrapper.appendChild(div);
            chatBox.appendChild(wrapper);
        }

        chatBox.scrollTop = chatBox.scrollHeight;
        chatTitle.textContent = conv.title || 'Sohbet';

        const kind = modelKind(conv.model);
        const tagColors = {
            local: ['#1e4a3a', '#7de3b3'],
            cloud: ['#3a2e5a', '#c9a8ff'],
            research: ['#4a3416', '#f0a868'],
        };
        const [bg, fg] = tagColors[kind];
        currentModelTag.style.background = bg;
        currentModelTag.style.color = fg;
        currentModelTag.textContent = modelIcon(kind) + ' ' + modelDisplayName(conv.model);
    }

    function addMessageTo(convId, role, content, model, fallback, requestedModel) {
        const conv = conversations[convId];
        if (!conv) return;
        const entry = { role, content };
        if (role !== 'system') entry.model = model || conv.model;
        if (fallback) {
            entry.fallback = true;
            entry.requestedModel = requestedModel;
        }
        conv.messages.push(entry);
        if (role === 'user' && conv.messages.filter(m => m.role === 'user').length === 1) {
            const newTitle = generateTitle(conv.messages);
            if (newTitle !== 'Yeni Sohbet') conv.title = newTitle;
        }
        save();
        if (convId === currentConvId) renderChat();
        renderHistory();
    }

    function updateSendButtonState() {
        const conv = conversations[currentConvId];
        const pending = !!(conv && conv.pending);
        sendBtn.disabled = pending;
        sendBtn.textContent = pending ? 'Düşünüyor...' : 'Gönder';
    }

    let modelStats = {};

    async function loadModelStats() {
        try {
            const res = await fetch('/model-stats');
            modelStats = await res.json();
        } catch (e) {
            modelStats = {};
        }
    }

    function speedLabel(model) {
        const stat = modelStats[model];
        if (!stat || !stat.count) return '';
        return ' (~' + stat.avg_seconds + 'sn)';
    }

    async function loadModels() {
        try {
            await loadModelStats();
            const res = await fetch('/models');
            const data = await res.json();
            const local = (data.local && data.local.length) ? data.local : ['moondream:latest'];
            const cloud = data.cloud || [];

            modelSelect.innerHTML = '';

            const localGroup = document.createElement('optgroup');
            localGroup.label = '🖥️ Yerel Modeller';
            local.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                let label = m;
                if (m.includes('moondream') || m.includes('vision')) label = '🖼️ ' + m + ' (Görsel)';
                label += speedLabel(m);
                opt.textContent = label;
                localGroup.appendChild(opt);
            });
            modelSelect.appendChild(localGroup);

            if (cloud.length) {
                const cloudGroup = document.createElement('optgroup');
                cloudGroup.label = '☁️ Bulut Modelleri';
                cloud.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m;
                    opt.textContent = '✨ ' + modelDisplayName(m) + speedLabel(m);
                    cloudGroup.appendChild(opt);
                });
                modelSelect.appendChild(cloudGroup);
            }

            const research = data.research || [];
            if (research.length) {
                const researchGroup = document.createElement('optgroup');
                researchGroup.label = '🔎 Araştırma Modları';
                research.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m;
                    opt.textContent = '🔎 ' + modelDisplayName(m);
                    researchGroup.appendChild(opt);
                });
                modelSelect.appendChild(researchGroup);
            }
        } catch (e) {
            console.error('Model listesi alınamadı:', e);
            modelSelect.innerHTML = '<option value="moondream:latest">moondream:latest</option>';
        }
    }

    function toBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = reject;
        });
    }

    selectImageBtn.onclick = () => imageInput.click();
    imageInput.onchange = async (e) => {
        const files = Array.from(e.target.files);
        for (let file of files) {
            const b64 = await toBase64(file);
            currentImages.push(b64);
            const div = document.createElement('div');
            div.className = 'preview-item';
            const img = document.createElement('img');
            img.src = URL.createObjectURL(file);
            const rm = document.createElement('span');
            rm.className = 'remove-img';
            rm.textContent = '✖';
            rm.onclick = () => {
                const idx = currentImages.indexOf(b64);
                if (idx !== -1) {
                    currentImages.splice(idx, 1);
                    div.remove();
                }
            };
            div.appendChild(img);
            div.appendChild(rm);
            previewContainer.appendChild(div);
        }
        previewContainer.style.display = 'flex';
        imageInput.value = '';
    };

    excelBtn.onclick = async () => {
        if (currentImages.length === 0) {
            addMessageTo(currentConvId, 'system', 'Lütfen önce bir görsel seçin.');
            return;
        }
        if (toolBusy) return;
        toolBusy = true;
        excelBtn.disabled = true;
        try {
            const model = conversations[currentConvId]?.model || 'moondream:latest';
            const res = await fetch('/image-to-excel', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ model, image: currentImages[0] })
            });
            if (res.ok) {
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'tablo.xlsx';
                a.click();
                URL.revokeObjectURL(url);
                const savedName = res.headers.get('X-Saved-Filename');
                addMessageTo(currentConvId, 'system', 'Excel dosyası indiriliyor' + (savedName ? ' — ayrıca excels/' + savedName + ' olarak da kaydedildi' : '...'));
            } else {
                let errMsg = 'Sunucu hatası (' + res.status + ')';
                try { const err = await res.json(); errMsg = err.error || errMsg; } catch (_) {}
                addMessageTo(currentConvId, 'system', 'Hata: ' + errMsg);
            }
        } catch (e) {
            addMessageTo(currentConvId, 'system', 'Excel hatası: ' + e.message);
        } finally {
            toolBusy = false;
            excelBtn.disabled = false;
        }
    };

    pdfBtn.onclick = () => pdfInput.click();
    pdfInput.onchange = async () => {
        const file = pdfInput.files[0];
        if (!file) return;
        try {
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch('/upload-pdf', { method: 'POST', body: formData });
            if (!res.ok) {
                addMessageTo(currentConvId, 'system', 'PDF yüklenemedi (sunucu hatası ' + res.status + ')');
                return;
            }
            const data = await res.json();
            if (data.text) {
                let note = 'PDF içeriği (' + data.pages + ' sayfa)';
                if (data.saved_as) note += ' — uploads/' + data.saved_as + ' olarak kaydedildi';
                addMessageTo(currentConvId, 'system', note + ':\n' + data.text.substring(0, 500) + '...');
            }
        } catch (e) {
            addMessageTo(currentConvId, 'system', 'PDF hatası: ' + e.message);
        } finally {
            pdfInput.value = '';
        }
    };

    // Bir sohbetin gecmisini modele gonderilecek formata cevirir (sistem
    // mesajlari haric, son N mesajla sinirlandirilir).
    const MAX_HISTORY_MESSAGES = 12;
    function buildHistoryForModel(conv) {
        return conv.messages
            .filter(m => m.role === 'user' || m.role === 'assistant')
            .slice(-MAX_HISTORY_MESSAGES)
            .map(m => ({ role: m.role, content: m.content }));
    }

    async function sendMessage() {
        const convId = currentConvId;
        if (!convId) return;
        const conv = conversations[convId];
        if (!conv || conv.pending) return;

        const prompt = promptEl.value.trim();
        if (!prompt && currentImages.length === 0) return;

        const imagesToSend = currentImages.slice();
        let userMsg = prompt || ('Görsel' + (imagesToSend.length > 1 ? 'ler' : '') + ' hakkında yorum yap');

        // Yeni mesaj eklenmeden ONCEKI durumu (gercek gecmis) yakala
        const history = buildHistoryForModel(conv);

        addMessageTo(convId, 'user', userMsg + (imagesToSend.length ? ' [' + imagesToSend.length + ' görsel]' : ''));
        promptEl.value = '';

        if (imagesToSend.length) {
            currentImages = [];
            previewContainer.innerHTML = '';
            previewContainer.style.display = 'none';
        }

        conv.pending = true;
        conv.streamingText = '';
        conv.streamingModel = conv.model;
        save();
        renderHistory();
        if (convId === currentConvId) { renderChat(); updateSendButtonState(); }

        const model = conv.model;
        const hasImages = imagesToSend.length > 0;
        const url = hasImages ? '/chat-multi-image' : '/chat';
        const body = hasImages
            ? { prompt: userMsg, model, images: imagesToSend, history }
            : { prompt: userMsg, model, history };

        let finalModel = model;
        let finalFallback = false;
        let finalRequestedModel = null;
        let accumulated = '';
        let streamError = null;

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (!res.ok || !res.body) {
                throw new Error('Sunucudan yanıt alınamadı (' + res.status + ')');
            }

            const reader = res.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); // son parca tam olmayabilir, bir sonrakine sakla

                for (const line of lines) {
                    if (!line.trim()) continue;
                    let evt;
                    try { evt = JSON.parse(line); } catch (e) { continue; }

                    if (evt.type === 'meta') {
                        finalModel = evt.model;
                        finalFallback = !!evt.fallback;
                        finalRequestedModel = evt.requested_model || null;
                        conv.streamingModel = finalModel;
                    } else if (evt.type === 'chunk') {
                        accumulated += evt.text;
                        conv.streamingText = accumulated;
                        if (convId === currentConvId) updateStreamingBubble(conv);
                    } else if (evt.type === 'error') {
                        streamError = evt.message;
                    }
                }
            }

            if (streamError && !accumulated) {
                throw new Error(streamError);
            }

            addMessageTo(convId, 'assistant', accumulated, finalModel, finalFallback, finalRequestedModel);
        } catch (e) {
            addMessageTo(convId, 'system', 'Hata: ' + e.message);
        } finally {
            conv.pending = false;
            conv.streamingText = '';
            conv.streamingModel = null;
            if (convId !== currentConvId) conv.hasNewReply = true;
            save();
            renderHistory();
            if (convId === currentConvId) { renderChat(); updateSendButtonState(); }
        }
    }

    promptEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    sendBtn.onclick = sendMessage;
    newChatBtn.onclick = () => createNewChat();

    themeToggle.onclick = () => {
        dark = !dark;
        document.body.style.background = dark ? '#0f0f13' : '#f0f0f0';
        document.body.style.color = dark ? '#e0e0e0' : '#111';
        themeToggle.innerHTML = dark ? '🌓 Tema' : '☀️ Tema';
    };

    modelSelect.onchange = function() {
        const model = this.value;
        if (!model) return;
        const existingId = findConvByModel(model);
        if (existingId) {
            openConversation(existingId);
        } else {
            const id = String(nextId++);
            conversations[id] = {
                title: model,
                model: model,
                pending: false,
                hasNewReply: false,
                messages: [{ role: 'system', content: 'Sistem: Yeni sohbet (' + modelDisplayName(model) + ') başladı.' }]
            };
            openConversation(id);
        }
    };

    (async function init() {
        await loadModels();
        loadConversations();
        if (!currentConvId || !conversations[currentConvId]) {
            createNewChat();
        }
    })();
})();
</script>
</body>
